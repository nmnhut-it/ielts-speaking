<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 3: Discussion Practice</title>
    <link rel="stylesheet" href="styles/part3-practice.css">
</head>
<body>
    <!-- Student Identification Modal -->
    <div class="identification-overlay" id="identificationOverlay"></div>
    <div class="identification-modal" id="identificationModal">
        <div class="modal-header">
            <h3>Student Identification</h3>
        </div>
        <div class="modal-body">
            <p class="identification-intro">Please enter your name and take a photo to start your practice session.</p>
            <div class="form-field">
                <label for="studentName">Your Name</label>
                <input type="text" id="studentName" placeholder="Enter your full name" autocomplete="name" required>
            </div>
            <div class="camera-section">
                <div class="camera-preview" id="cameraPreview">
                    <video id="cameraVideo" autoplay playsinline></video>
                    <div class="camera-placeholder" id="cameraPlaceholder">
                        <span class="camera-icon">📷</span>
                        <p>Camera will appear here</p>
                    </div>
                </div>
                <div class="photo-preview" id="photoPreview" style="display: none;">
                    <img id="capturedPhoto" alt="Your photo">
                </div>
                <div class="camera-controls">
                    <button class="btn-camera" id="startCameraBtn" onclick="startIdentificationCamera()">📷 Start Camera</button>
                    <button class="btn-camera" id="capturePhotoBtn" onclick="captureIdentificationPhoto()" style="display: none;">📸 Capture Photo</button>
                    <button class="btn-camera-secondary" id="retakePhotoBtn" onclick="retakeIdentificationPhoto()" style="display: none;">🔄 Retake</button>
                </div>
            </div>
            <button class="btn-primary btn-submit-identification" id="submitIdentificationBtn" onclick="submitIdentification()" disabled>
                Start Practice Session
            </button>
            <p class="identification-note">Your photo will be sent to your instructor via Telegram.</p>
        </div>
    </div>

    <!-- Top Bar -->
    <header class="top-bar">
        <a href="index.html" class="back-link">← Home</a>
        <h1 class="title">Part 3: Discussion</h1>
        <div class="progress-mini">
            <span id="progressCount" onclick="openJumpModal()" style="cursor: pointer;" title="Click to jump to question">0/40</span>
            <button class="settings-btn" onclick="toggleSettings()" aria-label="Settings">⚙</button>
        </div>
    </header>

    <!-- Jump Modal -->
    <div class="modal-overlay" id="jumpModalOverlay" onclick="closeJumpModal()"></div>
    <div class="jump-modal" id="jumpModal">
        <header class="modal-header">
            <h3>Jump to Question</h3>
            <button class="modal-close" onclick="closeJumpModal()" aria-label="Close">✕</button>
        </header>
        <div class="modal-body">
            <div class="jump-input-group">
                <input type="search" placeholder="Search questions..." id="searchInput" autocomplete="off">
                <div class="jump-number-group">
                    <input type="number" placeholder="#" id="jumpNumber" min="1" max="40">
                    <button class="btn-go" onclick="jumpToNumber()">Go</button>
                </div>
            </div>
            <div class="filter-tabs">
                <button class="tab-btn active" data-filter="all" onclick="setJumpFilter('all')">All</button>
                <button class="tab-btn" data-filter="favorites" onclick="setJumpFilter('favorites')">Favorites</button>
                <button class="tab-btn" data-filter="completed" onclick="setJumpFilter('completed')">Completed</button>
            </div>
            <div class="question-list" id="questionList"></div>
        </div>
    </div>

    <!-- Settings Overlay -->
    <div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>
    <aside class="settings-panel" id="settingsPanel">
        <h2>Settings</h2>
        <div class="setting-group">
            <label>Mode:</label>
            <div class="btn-group">
                <button class="btn-mode active" data-mode="sequential">Sequential</button>
                <button class="btn-mode" data-mode="random">Random</button>
                <button class="btn-mode" data-mode="favorites">Favorites</button>
            </div>
        </div>
        <div class="setting-group">
            <label>Strategy:</label>
            <select id="strategySelect" class="select">
                <option value="direct-plus" selected>Direct Answer Plus</option>
                <option value="two-sides">Two Sides</option>
                <option value="past-present-future">Past-Present-Future</option>
            </select>
        </div>
        <div class="setting-group">
            <label>Examiner Voice:</label>
            <div class="btn-group">
                <button class="btn-mode active" data-voice="on" onclick="toggleExaminerVoice(true)">On</button>
                <button class="btn-mode" data-voice="off" onclick="toggleExaminerVoice(false)">Off</button>
            </div>
        </div>
        <button class="btn-close" onclick="toggleSettings()">Done</button>
    </aside>

    <!-- Main Content - Chat Layout -->
    <main id="mainContent">
        <!-- Topic header -->
        <div class="topic-header" id="topicHeader">
            <span class="topic-badge" id="topicBadge">Society & Culture</span>
            <span class="q-counter" id="qCounter">1 / 40</span>
            <button class="btn-fav" id="favBtn" onclick="toggleFavorite()">☆</button>
        </div>

        <!-- Chat container -->
        <div class="chat-container" id="chatContainer">
            <!-- Messages appended dynamically -->
        </div>

        <!-- Speaking input (bottom, sticky) -->
        <div class="chat-input" id="chatInput">
            <div class="input-transcript" id="inputTranscript" style="display:none">
                <div id="liveText">Listening...</div>
                <div class="input-meta">
                    <span id="liveWordCount">0 words</span>
                    <span id="liveTimer">0:00</span>
                </div>
            </div>
            <div class="manual-input-area hidden" id="manualAnswerArea">
                <textarea id="manualAnswerInput" rows="4" placeholder="Type your answer here..."></textarea>
                <button onclick="submitManualAnswer()">Submit Answer</button>
            </div>
            <div class="input-actions">
                <button class="btn-prev" onclick="previousQuestion()">←</button>
                <button class="btn-mic" id="micBtn" onclick="toggleRecording()">🎤</button>
                <button class="btn-skip" id="skipBtn" onclick="skipToNext()">Skip →</button>
            </div>
        </div>

        <!-- Strategy hint (floating, collapsible) -->
        <div class="strategy-hint" id="strategyHint">
            <button class="hint-toggle" onclick="toggleStrategyHint()">💡 Strategy</button>
            <div class="hint-content" id="hintContent" style="display:none">
                <!-- Filled dynamically -->
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="shared/telegram.js"></script>
    <script src="shared/scripts/cameraCapture.js"></script>
    <script src="shared/scripts/studentSession.js"></script>
    <script src="shared/scripts/telegramSender.js"></script>
    <script src="shared/scripts/audioRecorder.js"></script>
    <script src="shared/scripts/sttService.js"></script>
    <script src="scripts/ieltsScoring.js"></script>
    <script src="scripts/scoreHistory.js"></script>
    <script src="scripts/practiceCommon.js"></script>
    <script src="scripts/part3-practice.js"></script>
</body>
</html>
